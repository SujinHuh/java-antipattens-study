<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Java/Spring Legacy Antipattern Review</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #647084;
      --line: #d9dfeb;
      --bad-bg: #fff1f1;
      --bad-line: #f1b7b7;
      --bad-title: #b42318;
      --good-bg: #eefaf2;
      --good-line: #a7dfb8;
      --good-title: #177245;
      --primary: #2457c5;
      --tag: #eef3ff;
      --shadow: 0 10px 26px rgba(23, 32, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
    }

    header {
      padding: 32px 24px 20px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .shell {
      max-width: 1280px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      max-width: 900px;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 16px 24px;
      background: rgba(247, 248, 251, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(240px, 1fr) auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    input[type="search"] {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 15px;
      background: var(--panel);
      color: var(--text);
    }

    .count {
      color: var(--muted);
      white-space: nowrap;
      font-size: 14px;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-btn {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
    }

    .filter-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    main {
      padding: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-head {
      padding: 18px 18px 12px;
      border-bottom: 1px solid var(--line);
    }

    .card-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    h2 {
      margin: 0;
      font-size: 19px;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .category {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 5px 9px;
      background: #eef2f7;
      color: #334155;
      font-size: 12px;
      font-weight: 700;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border: 1px solid #d6e1ff;
      border-radius: 999px;
      padding: 3px 8px;
      background: var(--tag);
      color: #244174;
      font-size: 12px;
      font-weight: 650;
    }

    .card-body {
      padding: 16px 18px 18px;
    }

    .compare {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .code-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      min-width: 0;
    }

    .code-label {
      padding: 8px 10px;
      font-weight: 800;
      font-size: 13px;
      border-bottom: 1px solid currentColor;
    }

    .bad .code-label {
      color: var(--bad-title);
      background: var(--bad-bg);
    }

    .good .code-label {
      color: var(--good-title);
      background: var(--good-bg);
    }

    pre {
      margin: 0;
      padding: 12px;
      overflow-x: auto;
      font-size: 12.5px;
      line-height: 1.5;
      tab-size: 2;
      white-space: pre;
    }

    .bad pre {
      background: var(--bad-bg);
      border-top: 1px solid var(--bad-line);
    }

    .good pre {
      background: var(--good-bg);
      border-top: 1px solid var(--good-line);
    }

    .tok-comment {
      color: #667085;
      font-style: italic;
    }

    .tok-anno {
      color: #7c3aed;
      font-weight: 700;
    }

    .tok-keyword {
      color: #1d4ed8;
      font-weight: 700;
    }

    .tok-type {
      color: #0f766e;
      font-weight: 700;
    }

    .tok-string {
      color: #b45309;
    }

    .tok-number {
      color: #be123c;
      font-weight: 650;
    }

    .problem {
      margin: 0 0 12px;
      color: #344054;
    }

    .interview {
      margin: 0;
      padding: 10px 12px;
      border-left: 4px solid var(--primary);
      background: #f1f5ff;
      border-radius: 6px;
      font-weight: 650;
    }

    .empty {
      display: none;
      padding: 28px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    @media (max-width: 980px) {
      .grid,
      .compare {
        grid-template-columns: 1fr;
      }

      .search-row {
        grid-template-columns: 1fr;
      }

      .count {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="shell">
      <h1>Java/Spring 레거시 안티패턴 빠른 복습</h1>
      <p class="subtitle">
        문제를 하나씩 푸는 화면이 아니라, 면접 전에 Controller, Service, Repository, DTO/Entity, Exception, Test, SOLID, Legacy Code 유형을 빠르게 훑어보는 학습 페이지입니다.
      </p>
    </div>
  </header>

  <section class="toolbar">
    <div class="shell">
      <div class="search-row">
        <input id="searchInput" type="search" placeholder="안티패턴 이름, 키워드, 설명으로 검색">
        <div id="count" class="count"></div>
      </div>
      <div id="filters" class="filters"></div>
    </div>
  </section>

  <main>
    <div class="shell">
      <section id="cards" class="grid" aria-live="polite"></section>
      <div id="empty" class="empty">검색 조건에 맞는 카드가 없습니다.</div>
    </div>
  </main>

  <script>
    const categories = [
      "All",
      "Controller",
      "Service",
      "Repository",
      "DTO / Entity",
      "Exception",
      "Test",
      "SOLID",
      "Legacy Code",
      "Util",
      "AOP",
      "RDBMS",
      "JPA / QueryDSL"
    ];

    const cards = [
      {
        name: "Controller에 비즈니스 로직 집중",
        category: "Controller",
        keywords: ["Controller 책임 과다", "SRP 위반", "Service 책임 누락"],
        bad: `// @RestController
class CouponController {
  private final CouponRepository repo = new CouponRepository();

  // @PostMapping("/coupons/use")
  public String use(CouponUseRequest request) {
    Coupon coupon = repo.findByCode(request.code);
    if (coupon == null || coupon.expired) {
      return "fail";
    }
    coupon.used = true;
    repo.save(coupon);
    return "ok";
  }
}`,
        good: `// @RestController
class CouponController {
  private final CouponService service;

  public ResponseEntity<CouponUseResponse> use(
      /* @Valid @RequestBody */ CouponUseRequest request) {
    CouponUseResponse response = service.use(request);
    return ResponseEntity.ok(response);
  }
}`,
        problem: "HTTP 계층이 쿠폰 조회, 만료 판단, 상태 변경, 저장까지 처리한다. Controller가 유스케이스를 직접 수행하면 테스트와 변경이 어려워진다.",
        interview: "Controller는 요청/응답 경계에 집중하고, 비즈니스 판단과 상태 변경은 Service 유스케이스로 분리해야 합니다."
      },
      {
        name: "Service 없이 Controller에서 검증과 계산 수행",
        category: "Controller",
        keywords: ["계층 책임", "Validation", "Transaction Script"],
        bad: `// @PostMapping("/orders")
public Map<String, Object> order(OrderRequest request) {
  if (request.amount <= 0) {
    return Map.of("status", 400);
  }
  int finalPrice = request.amount;
  if ("VIP".equals(request.grade)) {
    finalPrice = (int) (finalPrice * 0.9);
  }
  orderRepository.save(new Order(request.userId, finalPrice));
  return Map.of("status", 200);
}`,
        good: `// @PostMapping("/orders")
public ResponseEntity<OrderResponse> order(
    /* @Valid @RequestBody */ OrderRequest request) {
  OrderResponse response = orderService.order(request);
  return ResponseEntity.status(201).body(response);
}`,
        problem: "검증, 가격 정책, 저장이 Controller에 섞여 있다. HTTP 상태코드도 Map 안의 숫자로 표현되어 실제 HTTP 응답과 API 계약이 흔들린다.",
        interview: "Controller에서 계산과 저장까지 처리하면 계층 책임이 무너져 Service 테스트와 트랜잭션 경계를 잡기 어렵습니다."
      },
      {
        name: "Controller가 Entity를 그대로 응답",
        category: "DTO / Entity",
        keywords: ["Entity 직접 노출", "DTO/Entity 분리 실패", "API 계약"],
        bad: `// @GetMapping("/users/{id}")
public User find(Long id) {
  return userService.find(id);
}

class User {
  public Long id;
  public String email;
  public String passwordHash;
  public boolean admin;
}`,
        good: `// @GetMapping("/users/{id}")
public UserResponse find(Long id) {
  User user = userService.find(id);
  return new UserResponse(user.id(), user.email());
}

record UserResponse(Long id, String email) {}`,
        problem: "저장 모델이 API 응답 모델이 되면 내부 필드가 노출되고, DB 모델 변경이 API 변경으로 번진다.",
        interview: "Entity는 영속 상태를 표현하고 Response DTO는 외부 계약을 표현하므로 둘을 분리해야 합니다."
      },
      {
        name: "Repository에서 비즈니스 판단",
        category: "Repository",
        keywords: ["Repository 책임 위반", "계층 책임", "도메인 정책"],
        bad: `class CouponRepository {
  public boolean canUse(String code, Long userId) {
    Coupon coupon = findByCode(code);
    return coupon != null
        && !coupon.used
        && coupon.ownerId.equals(userId)
        && !coupon.expired;
  }
}`,
        good: `class CouponService {
  public void use(CouponUseRequest request) {
    Coupon coupon = couponRepository.findByCode(request.code())
        .orElseThrow(() -> new CouponNotFoundException(request.code()));
    coupon.validateOwner(request.userId());
    coupon.use(clock.now());
    couponRepository.save(coupon);
  }
}`,
        problem: "Repository가 저장소 접근을 넘어 쿠폰 사용 가능 정책까지 판단한다. 정책 변경 시 저장소 코드가 계속 바뀐다.",
        interview: "Repository는 조회/저장 책임에 집중하고, 사용 가능 여부 같은 도메인 정책은 Service나 Domain 객체에서 판단해야 합니다."
      },
      {
        name: "Repository가 null 반환",
        category: "Repository",
        keywords: ["null 처리", "Optional", "NPE 위험"],
        bad: `class OrderRepository {
  public Order findById(Long id) {
    for (Order order : orders) {
      if (order.id.equals(id)) {
        return order;
      }
    }
    return null;
  }
}`,
        good: `class OrderRepository {
  public Optional<Order> findById(Long id) {
    return orders.stream()
        .filter(order -> order.id().equals(id))
        .findFirst();
  }
}

Order order = repository.findById(id)
    .orElseThrow(() -> new OrderNotFoundException(id));`,
        problem: "조회 실패 가능성이 타입에 드러나지 않아 호출부가 null 처리를 놓치기 쉽다.",
        interview: "조회 실패가 가능한 Repository 메서드는 Optional이나 명확한 예외 흐름으로 실패 가능성을 드러내야 합니다."
      },
      {
        name: "Optional.get 직접 호출",
        category: "Service",
        keywords: ["Optional 오남용", "예외 흐름", "조회 실패"],
        bad: `public Order cancel(Long orderId) {
  Order order = orderRepository.findById(orderId).get();
  order.cancel();
  return orderRepository.save(order);
}`,
        good: `public Order cancel(Long orderId) {
  Order order = orderRepository.findById(orderId)
      .orElseThrow(() -> new OrderNotFoundException(orderId));
  order.cancel();
  return orderRepository.save(order);
}`,
        problem: "Optional을 반환받았지만 바로 get을 호출하면 값이 없을 때 NoSuchElementException으로 터지고 도메인 의미가 사라진다.",
        interview: "Optional은 get으로 꺼내기보다 orElseThrow로 조회 실패를 도메인 예외로 바꾸는 편이 안전합니다."
      },
      {
        name: "orElse로 비용 큰 기본값 생성",
        category: "Service",
        keywords: ["Optional", "orElse vs orElseGet", "성능"],
        bad: `Order order = orderRepository.findById(id)
    .orElse(createDefaultOrder(id));`,
        good: `Order order = orderRepository.findById(id)
    .orElseGet(() -> createDefaultOrder(id));`,
        problem: "orElse의 인자는 Optional에 값이 있어도 먼저 평가된다. 기본값 생성이 비싸거나 부작용이 있으면 불필요한 작업이 발생한다.",
        interview: "기본값 생성 비용이나 부작용이 있다면 orElse보다 orElseGet으로 지연 생성해야 합니다."
      },
      {
        name: "조회 실패를 임시 Entity 생성으로 숨김",
        category: "Service",
        keywords: ["실패 흐름 은폐", "데이터 정합성", "Optional"],
        bad: `Order order = orderRepository.findById(request.orderId())
    .orElse(new Order(request.orderId(), request.userId(), 0));

order.cancel();
orderRepository.save(order);`,
        good: `Order order = orderRepository.findById(request.orderId())
    .orElseThrow(() -> new OrderNotFoundException(request.orderId()));

order.validateOwner(request.userId());
order.cancel();
orderRepository.save(order);`,
        problem: "없는 주문을 새 주문처럼 만들어 정상 흐름으로 진행한다. 데이터 정합성 문제가 장애로 늦게 발견된다.",
        interview: "조회 실패는 기본 Entity로 숨기지 말고 명확한 실패 흐름으로 처리해야 합니다."
      },
      {
        name: "요청값의 서버 결정 상태 신뢰",
        category: "DTO / Entity",
        keywords: ["Parameter Tampering", "DTO 설계", "권한 검증"],
        bad: `class RefundRequest {
  public Long paymentId;
  public Long userId;
  public int refundAmount;
  public String status;
}

payment.status = request.status;
refundPg(request.refundAmount);`,
        good: `record RefundRequest(Long paymentId, Long userId, String reason) {}

Payment payment = paymentRepository.findById(request.paymentId())
    .orElseThrow(PaymentNotFoundException::new);
payment.validateOwner(request.userId());
int refundAmount = refundPolicy.calculate(payment);
payment.cancel(refundAmount);`,
        problem: "환불 금액과 상태는 서버가 저장된 결제 상태로 결정해야 한다. 클라이언트 입력을 신뢰하면 조작 가능성이 생긴다.",
        interview: "Request DTO에는 사용자의 의도만 받고, 상태와 금액 같은 서버 결정값은 서버에서 계산해야 합니다."
      },
      {
        name: "@Valid 누락과 도메인 검증 혼동",
        category: "Controller",
        keywords: ["@Valid", "Bean Validation", "도메인 검증"],
        bad: `// @PostMapping("/reservations")
public ReservationResponse reserve(
    /* @RequestBody */ ReservationRequest request) {
  return reservationService.reserve(request);
}`,
        good: `// @PostMapping("/reservations")
public ResponseEntity<ReservationResponse> reserve(
    /* @Valid @RequestBody */ ReservationRequest request) {
  ReservationResponse response = reservationService.reserve(request);
  return ResponseEntity.status(201).body(response);
}

record ReservationRequest(/* @NotNull */ Long roomId,
                          /* @Future */ LocalDate date) {}`,
        problem: "형식 검증이 Controller 경계에서 동작하지 않는다. 단, 소유자/상태 전이 같은 도메인 검증은 Service나 Domain에서 별도로 처리해야 한다.",
        interview: "DTO 형식 검증은 @Valid로 경계에서 막고, 상태 전이나 소유자 검증은 도메인 규칙으로 분리해야 합니다."
      },
      {
        name: "RuntimeException 무분별 사용",
        category: "Exception",
        keywords: ["RuntimeException", "도메인 예외", "공통 예외 처리"],
        bad: `if (order == null) {
  throw new RuntimeException("error");
}
if (!order.ownerId.equals(userId)) {
  throw new RuntimeException("error");
}`,
        good: `if (order == null) {
  throw new OrderNotFoundException(orderId);
}
if (!order.isOwnedBy(userId)) {
  throw new OrderAccessDeniedException(orderId, userId);
}`,
        problem: "원인과 대응이 다른 실패가 모두 같은 예외와 메시지로 표현된다. HTTP 상태 매핑과 FE/QA 시나리오가 불명확해진다.",
        interview: "실패 원인에 맞는 도메인 예외와 에러 코드를 사용해야 API 실패 계약을 안정적으로 만들 수 있습니다."
      },
      {
        name: "예외 메시지가 너무 모호함",
        category: "Exception",
        keywords: ["에러 코드", "API 계약", "협업"],
        bad: `throw new CouponException("fail");`,
        good: `throw new CouponAlreadyUsedException(couponId);

record ErrorResponse(String code, String message) {}

// COUPON_ALREADY_USED -> 409 Conflict`,
        problem: "fail 같은 메시지는 사용자가 무엇을 고쳐야 하는지, FE/QA가 어떤 케이스를 처리해야 하는지 알기 어렵다.",
        interview: "예외는 사람이 읽는 메시지뿐 아니라 클라이언트가 분기할 수 있는 에러 코드와 상태코드가 필요합니다."
      },
      {
        name: "Controller catch-all 예외 처리",
        category: "Controller",
        keywords: ["ControllerAdvice", "HTTP 상태코드", "예외 매핑"],
        bad: `try {
  service.cancel(request);
  return Map.of("status", 200, "message", "ok");
} catch (Exception e) {
  return Map.of("status", 200, "message", e.getMessage());
}`,
        good: `// @RestControllerAdvice
class ApiExceptionHandler {
  // @ExceptionHandler(OrderNotFoundException.class)
  ResponseEntity<ErrorResponse> notFound(OrderNotFoundException e) {
    return ResponseEntity.status(404)
        .body(new ErrorResponse("ORDER_NOT_FOUND", e.getMessage()));
  }
}`,
        problem: "실패도 200으로 응답하면 클라이언트와 운영 지표가 실패를 감지하기 어렵다.",
        interview: "Controller에서 모든 예외를 성공 응답으로 감싸지 말고, 공통 예외 처리에서 도메인 예외를 HTTP 상태로 매핑해야 합니다."
      },
      {
        name: "if문 중첩이 많은 코드",

        interview: "인터페이스는 사용하는 클라이언트 기준으로 작게 나눠 불필요한 의존을 줄여야 합니다."
      },
      {
        name: "LSP 위반: 하위 타입이 부모 계약을 깨뜨림",
        category: "SOLID",
        keywords: ["LSP 위반", "상속 오용", "계약 위반"],
        bad: `class Coupon {
  int discount(int amount) { return amount / 10; }
}

class DisabledCoupon extends Coupon {
  int discount(int amount) {
    throw new UnsupportedOperationException();
  }
}`,
        good: `interface DiscountPolicy {
  boolean supports(Coupon coupon);
  int discount(Coupon coupon, int amount);
}

class DisabledCouponPolicy implements DiscountPolicy {
  public int discount(Coupon coupon, int amount) { return 0; }
}`,
        problem: "부모 타입으로 사용할 수 있어야 하는데 특정 하위 타입이 예외를 던져 계약을 깨뜨린다.",
        interview: "상속을 쓸 때는 하위 타입이 부모 타입의 기대 동작을 깨지 않는지 봐야 하고, 정책 분리가 더 나은 경우가 많습니다."
      },
      {
        name: "인덱스를 타기 어려운 조건 조회",
        category: "RDBMS",
        keywords: ["인덱스", "실행계획", "LIKE", "조건 조회"],
        bad: `// Repository
List<Order> search(String keyword) {
  return jdbc.query("""
      select * from orders
      where lower(customer_name) like '%' || ? || '%'
      order by created_at desc
      """, keyword);
}`,
        good: `// 검색 요구가 크면 별도 검색 전략 검토
// 일반 목록은 인덱스 가능한 조건을 우선
select * from orders
where user_id = ?
  and status = ?
  and created_at between ? and ?
order by created_at desc
limit ? offset ?`,
        problem: "함수 적용과 앞쪽 와일드카드 검색은 일반 인덱스를 활용하기 어렵다. 데이터가 많아지면 실행계획과 응답 시간이 나빠질 수 있다.",
        interview: "목록/검색 API는 조건, 정렬, 페이징, 인덱스 사용 가능성을 함께 보고 실행계획을 확인해야 합니다."
      },
      {
        name: "페이징 없이 전체 목록 반환",
        category: "RDBMS",
        keywords: ["페이징", "정렬", "실행계획", "목록 API"],
        bad: `// @GetMapping("/orders")
public List<OrderResponse> findAll() {
  return orderRepository.findAll().stream()
      .map(OrderResponse::from)
      .toList();
}`,
        good: `// @GetMapping("/orders")
public Page<OrderResponse> findOrders(OrderSearchCondition condition,
                                      Pageable pageable) {
  return orderRepository.search(condition, pageable)
      .map(OrderResponse::from);
}`,
        problem: "전체 목록을 한 번에 반환하면 데이터 증가 시 메모리와 응답 시간이 커지고 정렬 기준도 불명확해진다.",
        interview: "목록 API는 조건 조회, 정렬, 페이징을 기본으로 보고 필요한 인덱스와 실행계획을 함께 확인해야 합니다."
      },
      {
        name: "JPA N+1 조회",
        category: "JPA / QueryDSL",
        keywords: ["JPA", "N+1", "fetch join"],
        bad: `List<Order> orders = orderRepository.findAll();
for (Order order : orders) {
  System.out.println(order.getUser().getName());
}`,
        good: `// JPQL 예시
select o from Order o
join fetch o.user
where o.status = :status`,
        problem: "주문 목록 조회 후 각 주문의 연관 User를 지연 로딩하면 주문 수만큼 추가 쿼리가 발생할 수 있다.",
        interview: "JPA 목록 조회에서는 연관 엔티티 접근으로 N+1이 생기는지 보고, fetch join이나 batch size 등 조회 전략을 검토해야 합니다."
      },
      {
        name: "JPA Entity를 API 응답으로 직접 반환",
        category: "JPA / QueryDSL",
        keywords: ["JPA Entity", "Lazy Loading", "DTO Projection"],
        bad: `// @GetMapping("/orders/{id}")
public Order find(Long id) {
  return orderRepository.findById(id).orElseThrow();
}`,
        good: `// @GetMapping("/orders/{id}")
public OrderResponse find(Long id) {
  Order order = orderRepository.findById(id).orElseThrow();
  return OrderResponse.from(order);
}`,
        problem: "JPA Entity를 그대로 반환하면 지연 로딩, 순환 참조, 내부 필드 노출, API 계약 결합 문제가 생길 수 있다.",
        interview: "JPA Entity는 영속 모델이고 API 응답은 외부 계약이므로 Response DTO나 projection으로 분리하는 편이 안전합니다."
      },
      {
        name: "QueryDSL 동적 조건에서 null 처리 혼동",
        category: "JPA / QueryDSL",
        keywords: ["QueryDSL", "동적 쿼리", "조건 조립"],
        bad: `BooleanExpression condition =
    order.userId.eq(userId)
        .and(order.status.eq(status))
        .and(order.keyword.contains(keyword));`,
        good: `BooleanExpression statusEq(OrderStatus status) {
  return status == null ? null : order.status.eq(status);
}

BooleanExpression keywordContains(String keyword) {
  return hasText(keyword) ? order.memo.contains(keyword) : null;
}`,
        problem: "검색 조건이 null일 수 있는데 그대로 eq/contains를 호출하면 NPE가 나거나 의도하지 않은 조건이 붙을 수 있다.",
        interview: "동적 쿼리는 조건 생성 메서드를 작게 나누고 null 조건을 명확히 제외해 검색 의도를 드러내야 합니다."
      },
      {
        name: "Liquibase 변경 이력 없이 스키마 수동 변경",
        category: "JPA / QueryDSL",
        keywords: ["Liquibase", "Schema Migration", "운영 배포"],
        bad: `// 운영 DB에서 직접 실행
alter table orders add column cancel_reason varchar(255);

// 코드에는 변경 이유와 순서가 남지 않음`,
        good: `--liquibase formatted sql
-- db/changelog/2026-06-30-add-cancel-reason.sql
-- changeset sujin:add-cancel-reason
alter table orders add column cancel_reason varchar(255);
-- rollback alter table orders drop column cancel_reason;`,
        problem: "스키마 변경을 수동으로 하면 환경별 DB 상태가 달라지고 배포/롤백 이력이 남지 않는다.",
        interview: "운영 스키마 변경은 Liquibase 같은 마이그레이션 도구로 변경 이력, 순서, 롤백 전략을 관리해야 합니다."
      }
    ];

    const filterRoot = document.getElementById("filters");
    const cardsRoot = document.getElementById("cards");
    const searchInput = document.getElementById("searchInput");
    const count = document.getElementById("count");
    const empty = document.getElementById("empty");
    let selectedCategory = "All";

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function highlightJava(value) {
      const escaped = escapeHtml(value);
      const placeholders = [];
      const hold = (html) => {
        const key = `@@TOKEN_${placeholders.length}@@`;
        placeholders.push(html);
        return key;
      };

      let highlighted = escaped
        .replace(/(\/\/[^\n]*)/g, (match) => hold(`<span class="tok-comment">${match}</span>`))
        .replace(/(&quot;.*?&quot;|".*?")/g, (match) => hold(`<span class="tok-string">${match}</span>`))
        .replace(/\b(@[A-Za-z_][A-Za-z0-9_]*)\b/g, '<span class="tok-anno">$1</span>')
        .replace(/\b(class|interface|enum|record|public|private|protected|static|final|void|return|new|if|else|for|while|try|catch|throw|throws|extends|implements|null|true|false|this)\b/g, '<span class="tok-keyword">$1</span>')
        .replace(/\b(String|Long|Integer|Optional|List|Map|ResponseEntity|LocalDate|LocalDateTime|Clock|RuntimeException|Exception)\b/g, '<span class="tok-type">$1</span>')
        .replace(/\b(\d[\d_]*)\b/g, '<span class="tok-number">$1</span>');

      placeholders.forEach((html, index) => {
        highlighted = highlighted.replace(`@@TOKEN_${index}@@`, html);
      });

      return highlighted;
    }

    function renderFilters() {
      filterRoot.innerHTML = categories.map(category => `
        <button class="filter-btn ${category === selectedCategory ? "active" : ""}"
                data-category="${category}">
          ${category}
        </button>
      `).join("");

      filterRoot.querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => {
          selectedCategory = button.dataset.category;
          render();
        });
      });
    }

    function matches(card, query) {
      const source = [
        card.name,
        card.category,
        card.keywords.join(" "),
        card.problem,
        card.interview,
        card.bad,
        card.good
      ].join(" ").toLowerCase();
      return source.includes(query.toLowerCase());
    }

    function renderCards(filtered) {
      cardsRoot.innerHTML = filtered.map(card => `
        <article class="card">
          <div class="card-head">
            <div class="card-title-row">
              <h2>${escapeHtml(card.name)}</h2>
              <span class="category">${escapeHtml(card.category)}</span>
            </div>
            <div class="tags">
              ${card.keywords.map(keyword => `<span class="tag">${escapeHtml(keyword)}</span>`).join("")}
            </div>
          </div>
          <div class="card-body">
            <div class="compare">
              <section class="code-box bad">
                <div class="code-label">잘못된 코드</div>
                <pre><code>${highlightJava(card.bad)}</code></pre>
              </section>
              <section class="code-box good">
                <div class="code-label">리팩토링된 코드</div>
                <pre><code>${highlightJava(card.good)}</code></pre>
              </section>
            </div>
            <p class="problem"><strong>무엇이 문제인지:</strong> ${escapeHtml(card.problem)}</p>
            <p class="interview">${escapeHtml(card.interview)}</p>
          </div>
        </article>
      `).join("");
    }

    function render() {
      const query = searchInput.value.trim();
      const filtered = cards.filter(card => {
        const categoryMatched = selectedCategory === "All" || card.category === selectedCategory;
        const queryMatched = query.length === 0 || matches(card, query);
        return categoryMatched && queryMatched;
      });

      renderFilters();
      renderCards(filtered);
      count.textContent = `${filtered.length} / ${cards.length}개 표시`;
      empty.style.display = filtered.length === 0 ? "block" : "none";
    }

    searchInput.addEventListener("input", render);
    render();
  </script>
</body>
</html>
